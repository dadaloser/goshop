apiVersion: apps/v1
kind: Deployment
metadata:
  name: goshop-goods-srv
  labels:
    app.kubernetes.io/part-of: goshop
    app.kubernetes.io/name: goshop-goods-srv
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/part-of: goshop
      app.kubernetes.io/name: goshop-goods-srv
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: goshop
        app.kubernetes.io/name: goshop-goods-srv
    spec:
      containers:
        - name: goods
          image: goshop/goods:latest
          ports:
            - {name: grpc, containerPort: 8010}
            - {name: metrics, containerPort: 8051}
          envFrom:
            - secretRef: {name: goshop-goods-secrets}
          readinessProbe:
            httpGet: {path: /healthz, port: metrics}
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: metrics}
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: goshop-goods-srv
  labels:
    app.kubernetes.io/part-of: goshop
    app.kubernetes.io/name: goshop-goods-srv
spec:
  selector:
    app.kubernetes.io/part-of: goshop
    app.kubernetes.io/name: goshop-goods-srv
  ports:
    - {name: grpc, port: 8010, targetPort: grpc}
    - {name: metrics, port: 8051, targetPort: metrics}
