syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
option go_package = "./;v1";

//protoc -I. --proto_path=../../../third_party --go_out=. --go-grpc_out=. --gin_out=. user.proto

service User{
    rpc GetUserList(PageInfo) returns (UserListResponse){
        option (google.api.http) = {
            post: "/v1/users"
            body: "*"
        };
    }; // 用户列表
    rpc GetUserByMobile(MobileRequest) returns (UserInfoResponse){
        option (google.api.http) = {
            post: "/v1/user/mobile"
            body: "*"
        };
    }; //通过mobile查询用户
    rpc GetUserById(IdRequest) returns (UserInfoResponse){
        option (google.api.http) = {
            post: "/v1/user/id"
            body: "*"
        };
    }; //通过id查询用户
    rpc CreateStaffUser(CreateStaffUserRequest) returns (StaffUserResponse);
    rpc UpdateUserStatus(UpdateUserStatusRequest) returns (UserInfoResponse);
    rpc ListStaffRoles(google.protobuf.Empty) returns (StaffRoleListResponse);
    rpc CreateStaffRole(CreateStaffRoleRequest) returns (StaffRole);
    rpc UpdateStaffRole(UpdateStaffRoleRequest) returns (StaffRole);
    rpc DeleteStaffRole(DeleteStaffRoleRequest) returns (google.protobuf.Empty);
    rpc GetUserStaffRoles(IdRequest) returns (UserRoleBindingResponse);
    rpc ReplaceUserStaffRoles(ReplaceUserStaffRolesRequest) returns (UserRoleBindingResponse);
    rpc ListUserAuditLogs(UserAuditLogPageRequest) returns (UserAuditLogListResponse);
    rpc CreateAdminAuditLog(CreateAdminAuditLogRequest) returns (google.protobuf.Empty);
    rpc ListAdminAuditLogs(AdminAuditLogPageRequest) returns (AdminAuditLogListResponse);
    rpc GetUserAuthByMobile(MobileRequest) returns (UserAuthResponse); // auth-only by username/mobile/email
    rpc GetUserAuthById(IdRequest) returns (UserAuthResponse); // auth-only by id
    rpc CreateUser(CreateUserInfo) returns (UserInfoResponse){
        option (google.api.http) = {
            post: "/v1/user/create"
            body: "*"
        };
    }; // 添加用户
    rpc UpdateUser(UpdateUserInfo) returns (google.protobuf.Empty){
        option (google.api.http) = {
            post: "/v1/user/update"
            body: "*"
        };
    }; // 更新用户
    rpc DeleteUser(IdRequest) returns (google.protobuf.Empty){
        option (google.api.http) = {
            delete: "/v1/user/{id}"
        };
    }; // 注销用户
    rpc CheckPassWord(PasswordCheckInfo) returns (CheckResponse){
        option (google.api.http) = {
            post: "/v1/user/password"
            body: "*"
        };
    }; //检查密码
    rpc RecordLogin(RecordLoginRequest) returns (google.protobuf.Empty);
    rpc CreateSession(CreateSessionRequest) returns (SessionResponse);
    rpc RefreshSession(RefreshSessionRequest) returns (SessionResponse);
    rpc RevokeSession(RevokeSessionRequest) returns (google.protobuf.Empty);
    rpc RevokeAllSessions(IdRequest) returns (google.protobuf.Empty);
    rpc ValidateSession(ValidateSessionRequest) returns (SessionValidationResponse);
    rpc ReplaceUserResourceScopes(ReplaceUserResourceScopesRequest) returns (UserResourceScopeListResponse);
}

message UserResourceScope { string domain = 1; string storeId = 2; string teamId = 3; }
message ReplaceUserResourceScopesRequest { int32 userId = 1; repeated UserResourceScope scopes = 2; AuditActor actor = 3; }
message UserResourceScopeListResponse { int32 userId = 1; repeated UserResourceScope scopes = 2; }

message RecordLoginRequest {
    int32 userId = 1;
    uint64 loggedInAt = 2;
}

message CreateSessionRequest {
    int32 userId = 1;
    string deviceId = 2;
    string deviceName = 3;
    bytes refreshTokenHash = 4;
    uint64 expiresAt = 5;
}

message RefreshSessionRequest {
    string sessionId = 1;
    bytes currentTokenHash = 2;
    bytes nextTokenHash = 3;
    uint64 expiresAt = 4;
}

message RevokeSessionRequest {
    int32 userId = 1;
    string sessionId = 2;
}

message ValidateSessionRequest {
    int32 userId = 1;
    string sessionId = 2;
}

message SessionResponse {
    string id = 1;
    int32 userId = 2;
    string deviceId = 3;
    string deviceName = 4;
    uint64 expiresAt = 5;
}

message SessionValidationResponse {
    bool active = 1;
}

message PasswordCheckInfo {
    string password = 1;
    string encryptedPassword = 2;
}


message CheckResponse{
    bool success = 1;
}

message PageInfo {
    uint32 pn = 1;
    uint32 pSize = 2;
}

message MobileRequest{
    string mobile = 1;
}

message IdRequest {
    int32 id = 1;
}

message CreateUserInfo {
    string nickName = 1;
    string passWord = 2;
    string mobile = 3;
    string email = 4;
    string username = 5;
    bool mobileVerified = 6;
    bool emailVerified = 7;
}

message UpdateUserInfo {
    int32 id = 1;
    string nickName = 2;
    string gender = 3;
    uint64 birthDay = 4;
    string email = 5;
    string username = 6;
}

message AuditActor {
    int32 actorUserId = 1;
    string principalType = 2;
}

message CreateStaffUserRequest {
    CreateUserInfo user = 1;
    repeated string roles = 2;
    string status = 3;
    AuditActor actor = 4;
}

message UpdateUserStatusRequest {
    int32 id = 1;
    string status = 2;
    AuditActor actor = 3;
}

message UserInfoResponse {
    int32 id = 1;
    reserved 2;
    reserved 7;
    string mobile = 3;
    string nickName = 4;
    uint64 birthDay = 5;
    string gender = 6;
    string email = 8;
    string username = 9;
    string status = 10;
    bool mobileVerified = 11;
    bool emailVerified = 12;
    uint64 lastLoginAt = 13;
}

message UserAuthResponse {
    UserInfoResponse user = 1;
    string passwordHash = 2;
    int32 legacyRole = 3;
    repeated string staffRoles = 4;
    repeated string permissions = 5;
    repeated string resourceDomains = 6;
    repeated string resourceStores = 7;
    repeated string resourceTeams = 8;
}

message UserListResponse {
    int32 total = 1;
    repeated UserInfoResponse data = 2;
}

message StaffRole {
    string name = 1;
    string description = 2;
    repeated string permissions = 3;
    bool builtin = 4;
    repeated string domains = 5;
}

message StaffRoleListResponse {
    repeated StaffRole roles = 1;
}

message CreateStaffRoleRequest {
    StaffRole role = 1;
    AuditActor actor = 2;
}

message UpdateStaffRoleRequest {
    StaffRole role = 1;
    AuditActor actor = 2;
}

message DeleteStaffRoleRequest {
    string name = 1;
    AuditActor actor = 2;
}

message ReplaceUserStaffRolesRequest {
    int32 userId = 1;
    repeated string roles = 2;
    AuditActor actor = 3;
}

message UserRoleBindingResponse {
    int32 userId = 1;
    repeated string roles = 2;
    repeated string permissions = 3;
}

message StaffUserResponse {
    UserInfoResponse user = 1;
    repeated string roles = 2;
    repeated string permissions = 3;
}

message UserAuditLogPageRequest {
    int32 userId = 1;
    uint32 pn = 2;
    uint32 pSize = 3;
    string action = 4;
    int32 actorUserId = 5;
    string actorPrincipalType = 6;
    uint64 createdAfter = 7;
    uint64 createdBefore = 8;
}

message UserAuditLog {
    int64 id = 1;
    int32 userId = 2;
    int32 actorUserId = 3;
    string actorPrincipalType = 4;
    string action = 5;
    string fromStatus = 6;
    string toStatus = 7;
    string detail = 8;
    uint64 createdAt = 9;
}

message UserAuditLogListResponse {
    int32 total = 1;
    repeated UserAuditLog data = 2;
}

message AdminAuditLog {
    int64 id = 1;
    int32 targetUserId = 2;
    int32 actorUserId = 3;
    string actorPrincipalType = 4;
    string action = 5;
    string detail = 6;
    uint64 createdAt = 7;
    string correlationId = 8;
    string requestId = 9;
    string targetType = 10;
    string targetId = 11;
    string domain = 12;
    string storeId = 13;
    string teamId = 14;
}

message CreateAdminAuditLogRequest {
    AdminAuditLog log = 1;
}

message AdminAuditLogPageRequest {
    int32 targetUserId = 1;
    uint32 pn = 2;
    uint32 pSize = 3;
    string action = 4;
    int32 actorUserId = 5;
    string actorPrincipalType = 6;
    uint64 createdAfter = 7;
    uint64 createdBefore = 8;
}

message AdminAuditLogListResponse {
    int32 total = 1;
    repeated AdminAuditLog data = 2;
}
