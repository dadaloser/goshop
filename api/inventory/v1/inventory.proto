syntax = "proto3";
import "google/protobuf/empty.proto";
option go_package = ".;proto";

//protoc -I. --proto_path=../../../third_party --go_out=. --go-grpc_out=. --gin_out=. inventory.proto

service Inventory {
    rpc SetInv(GoodsInvInfo) returns(google.protobuf.Empty); //设置库存
    rpc SetStock(GoodsInvInfo) returns(google.protobuf.Empty); //设置库存(新接口)
    rpc InvDetail(GoodsInvInfo) returns (GoodsInvInfo); // 获取库存信息
    rpc GetStock(GoodsInvInfo) returns (GoodsInvInfo); // 获取库存信息(新接口)
    rpc GetSellDetail(OrderInfo) returns (SellDetailInfo); //按订单号获取库存预留记录
    rpc Sell(SellInfo) returns (google.protobuf.Empty); //库存扣减
    rpc Reserve(SellInfo) returns (google.protobuf.Empty); //库存预留(新接口)
    rpc Reback(SellInfo) returns(google.protobuf.Empty); //库存归还
    rpc Confirm(SellInfo) returns(google.protobuf.Empty); //支付成功确认库存
    rpc Release(SellInfo) returns(google.protobuf.Empty); //支付失败/关闭释放库存
    rpc ListAdjustments(InventoryAdjustmentListRequest) returns (InventoryAdjustmentListResponse);
}

message GoodsInvInfo {
    int32 goodsId = 1;
    int32 num = 2;
    int32 total = 3;
    int32 available = 4;
    int32 locked = 5;
    int32 sold = 6;
    int32 actorUserId = 7;
    string correlationId = 8;
    string requestId = 9;
    string reason = 10;
}

message InventoryAdjustmentListRequest { int32 goodsId = 1; int32 page = 2; int32 pageSize = 3; }
message InventoryAdjustment { int64 id = 1; int32 goodsId = 2; int32 beforeAvailable = 3; int32 afterAvailable = 4; int32 actorUserId = 5; string correlationId = 6; string requestId = 7; string reason = 8; int64 createdAt = 9; }
message InventoryAdjustmentListResponse { int32 total = 1; repeated InventoryAdjustment data = 2; }

message SellInfo {
    repeated GoodsInvInfo goodsInfo = 1;
    string orderSn = 2;
}

message OrderInfo {
    string orderSn = 1;
}

message SellDetailInfo {
    string orderSn = 1;
    int32 status = 2;
    string statusName = 3;
    repeated GoodsInvInfo goodsInfo = 4;
}
