syntax = "proto3";
import "google/protobuf/empty.proto";
option go_package = ".;proto";

//

service Order {
    //购物车
    rpc CartItemList(UserInfo) returns(CartItemListResponse); //获取用户的购物车信息
    rpc CreateCartItem(CartItemRequest) returns(ShopCartInfoResponse); //添加商品到购物车
    rpc UpdateCartItem(CartItemRequest) returns(google.protobuf.Empty); //修改购物车信息
    rpc DeleteCartItem(CartItemRequest) returns(google.protobuf.Empty); //删除购物车条目

    //订单
    rpc CreateOrder(OrderRequest) returns (google.protobuf.Empty); //创建订单
    rpc CreateOrderCom(OrderRequest) returns (google.protobuf.Empty); //创建订单补偿
    rpc SubmitOrder(OrderRequest) returns (google.protobuf.Empty); //提交订单
    rpc OrderList(OrderFilterRequest) returns (OrderListResponse); // 订单列表
    rpc OrderDetail(OrderRequest) returns (OrderInfoDetailResponse); // 订单详情
    rpc OrderStatusLogs(OrderRequest) returns (OrderStatusLogListResponse); // 订单状态日志
    rpc GetOrderBySn(OrderLookupRequest) returns (OrderInfoDetailResponse); // 按订单号查询订单详情
    rpc UpdateOrderStatus(OrderStatus) returns (google.protobuf.Empty); // 修改订单状态
}

message UserInfo {
    int32 id = 1;
}

message OrderStatus {
    int32 id = 1;
    string orderSn = 2;
    string status = 3;
    string payType = 4;
    string tradeNo = 5;
    int64 payTime = 6;
    int32 actorUserId = 7;
    int64 refundAmountFen = 8;
    string reason = 9;
    string correlationId = 10;
    string requestId = 11;
}

message CartItemRequest {
    int32 id = 1;
    int32 userId = 2;
    int32 goodsId = 3;
    string goodsName = 4;
    string goodsImage = 5;
    reserved 6;
    reserved "goodsPrice";
    int32 nums = 7;
    bool checked = 8;
    int64 goodsPriceFen = 9;
}

message OrderRequest {
    int32 id = 1;
    int32 userId = 2;
    string address = 3;
    string name = 4;
    string mobile = 5;
    string post = 6;
    string orderSn = 7;

    repeated OrderItemResponse orderItems = 8;
}

message OrderLookupRequest {
    string orderSn = 1;
}

message OrderInfoResponse {
    int32 id = 1;
    int32 userId = 2;
    string orderSn = 3;
    string payType = 4;
    string status = 5;
    string post = 6;
    reserved 7;
    reserved "total";
    string address = 8;
    string name = 9;
    string mobile = 10;
    string addTime = 11;
    string tradeNo = 12;
    int64 payTime = 13;
    int64 totalFen = 14;
}

message ShopCartInfoResponse {
    int32 id = 1;
    int32 userId = 2;
    int32 goodsId = 3;
    int32 nums = 4;
    bool checked = 5;
}

message OrderItemResponse {
    int32 id = 1;
    int32 orderId = 2;
    int32 goodsId = 3;
    string goodsName = 4;
    string goodsImage = 5;
    reserved 6;
    reserved "goodsPrice";
    int32 nums = 7;
    int64 goodsPriceFen = 8;
}

message OrderInfoDetailResponse {
    OrderInfoResponse orderInfo = 1;
    repeated OrderItemResponse goods = 2;
}

message OrderStatusLogResponse {
    int32 id = 1;
    int32 orderId = 2;
    string orderSn = 3;
    string fromStatus = 4;
    string toStatus = 5;
    string reason = 6;
    string source = 7;
    string operator = 8;
    string addTime = 9;
}

message OrderStatusLogListResponse {
    int32 total = 1;
    repeated OrderStatusLogResponse data = 2;
}

message OrderFilterRequest {
    int32 userId = 1;
    int32 pages = 2;
    int32 pagePerNums = 3;
}

message OrderListResponse {
    int32 total = 1;
    repeated OrderInfoResponse data = 2;
}

message CartItemListResponse {
    int32 total = 1;
    repeated ShopCartInfoResponse data = 2;
}
