server:
  name: goshop-user-srv #服务名，注册到consul使用的名称
  limit: true #是否开启熔断限流
  host: "0.0.0.0" #host, 默认使用 0.0.0.0
  port: 8014 # grpc 安全模式的端口号，默认 8081
  http-port: 8054
  healthz: true # 是否开启健康检查，如果开启会安装 /healthz 路由，默认 true
  enable-metrics: true # 开启 metrics, router:  /metrics
  profiling: false # 开启性能分析时必须同时配置 profiling-token
  profiling-token: ""

log:
  name: goshop-user-srv #logger的名称
  development: true # 是否开启开发模式，开发模式下会打印调试信息，默认 false
  level: debug # 日志级别，优先级从低到高依次为：debug, info, warn, error, dpanic, panic, fatal。
  format: console # 支持的日志输出格式，目前支持console和json两种。console其实就是text格式。
  enable-color: true # 是否开启颜色输出，true:是，false:否
  disable-caller: false # 是否开启 caller，如果开启会在日志中显示调用日志所在的文件、函数和行号
  disable-stacktrace: false # 是否再panic及以上级别禁止打印堆栈信息
  output-paths: logs/goshop-user-srv.log,stdout # 支持输出到多个输出，逗号分开。支持输出到标准输出（stdout）和文件。
  error-output-paths: logs/goshop-user-srv.error.log # zap内部(非业务)错误日志输出路径，多个输出，逗号分开

#consul注册
registry:
  address: 192.168.1.92:8500
  scheme: http

rpc-security:
  cert-file: "configs/tls/dev/internal.crt" # dev only; replace with per-service cert in production
  key-file: "configs/tls/dev/internal.key" # dev only
  ca-file: "configs/tls/dev/internal.crt" # dev only
  server-name: "goshop.internal"

telemetry:
  name: goshop-user-srv
  endpoint: "http://127.0.0.1:14268/api/traces" # 单独本地启动 user 服务时关闭 trace 导出；需要链路追踪时改为 collector 地址
  sampler: 1.0
  batcher: jaeger #设置使用的框架

# MySQL 数据库相关配置
mysql:
  host: "103.119.16.145" # MySQL 机器 ip，默认 127.0.0.1
  port: "3306"
  password: "" # use USER_MYSQL_PASSWORD or secret manager in production
  username: "" # use USER_MYSQL_USERNAME or secret manager in production
  database: "goshop_user_srv" # iam 系统所用的数据库名
  max-idle-connections: 100 # MySQL 最大空闲连接数，默认 100
  max-open-connections: 100 # MySQL 最大打开的连接数，默认 100
  max-connection-life-time: 10s # 空闲连接最大存活时间，默认 10s
  log-level: 4 # GORM log level, 1: silent, 2:error, 3:warn, 4:info
  auto-migrate: false # 生产环境禁止应用启动时自动改表，使用 migration 工具
  resilience:
    enabled: true
    timeout: 2s
    max-concurrency: 100
    error-ratio: 0.5
    min-request-amount: 20
    stat-interval: 10s
    recovery-timeout: 30s

nacos:
  host: "192.168.1.119"
  port: 8848
  namespace: 'c3462af8-7d33-4f4b-9d1d-152142965cf1'
  user: ""
  password: ""
  dataid: "flow.json"
  group: "sentinel-go"
