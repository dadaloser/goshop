apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: goshop-dependency-resilience-alerts
  labels:
    app.kubernetes.io/name: goshop
    app.kubernetes.io/component: dependency-resilience
spec:
  groups:
    - name: goshop-dependency-resilience
      rules:
        - alert: DependencyCircuitOpen
          expr: |
            max by (job, dependency, resource) (
              dependency_resilience_circuit_state
            ) == 2
          for: 2m
          labels:
            severity: critical
            team: platform
            owner: platform-oncall
          annotations:
            summary: "External dependency circuit is open"
            description: "{{ $labels.job }} is rejecting {{ $labels.dependency }} resource {{ $labels.resource }} calls because its circuit remains open."
            runbook_url: "https://github.com/imooc/goshop/blob/main/docs/runbooks/service-alerts.md#error-ratio"

        - alert: DependencyFallbackRateHigh
          expr: |
            sum by (job, dependency, resource) (
              rate(dependency_resilience_fallback_total[5m])
            ) > 0.1
          for: 5m
          labels:
            severity: warning
            team: platform
            owner: platform-oncall
          annotations:
            summary: "External dependency fallback rate is elevated"
            description: "{{ $labels.job }} is failing fast more than 0.1 calls/s for {{ $labels.dependency }} resource {{ $labels.resource }}."
            runbook_url: "https://github.com/imooc/goshop/blob/main/docs/runbooks/service-alerts.md#error-ratio"

        - alert: DependencyTimeoutRatioHigh
          expr: |
            sum by (job, dependency, resource) (
              rate(dependency_resilience_requests_total{outcome="timeout"}[10m])
            )
            /
            clamp_min(
              sum by (job, dependency, resource) (
                rate(dependency_resilience_requests_total[10m])
              ),
              0.001
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            team: platform
            owner: platform-oncall
          annotations:
            summary: "External dependency timeout ratio is high"
            description: "More than 5% of {{ $labels.dependency }} resource {{ $labels.resource }} calls from {{ $labels.job }} are timing out."
            runbook_url: "https://github.com/imooc/goshop/blob/main/docs/runbooks/service-alerts.md#latency"

        - alert: DependencyIsolationNearCapacity
          expr: |
            max by (job, dependency, resource) (
              dependency_resilience_inflight
            ) > 80
          for: 5m
          labels:
            severity: warning
            team: platform
            owner: platform-oncall
          annotations:
            summary: "External dependency isolation is near default capacity"
            description: "{{ $labels.job }} has more than 80 in-flight calls for {{ $labels.dependency }} resource {{ $labels.resource }}. Adjust this threshold when max-concurrency differs from 100."
            runbook_url: "https://github.com/imooc/goshop/blob/main/docs/runbooks/service-alerts.md#saturation"

        - alert: DependencyCircuitRecoveryFlapping
          expr: |
            sum by (job, dependency, resource) (
              rate(dependency_resilience_circuit_transitions_total[15m])
            ) > 0.05
          for: 15m
          labels:
            severity: warning
            team: platform
            owner: platform-oncall
          annotations:
            summary: "External dependency circuit is flapping"
            description: "{{ $labels.dependency }} resource {{ $labels.resource }} in {{ $labels.job }} is repeatedly changing circuit state."
            runbook_url: "https://github.com/imooc/goshop/blob/main/docs/runbooks/service-alerts.md#error-ratio"
