apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: goshop-observability-http-internal-only
  labels:
    app.kubernetes.io/name: goshop
    app.kubernetes.io/component: observability
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/part-of
        operator: In
        values:
          - goshop
      - key: app.kubernetes.io/name
        operator: In
        values:
          - goshop-api
          - goshop-admin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8049
        - protocol: TCP
          port: 8050
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: goshop
      ports:
        - protocol: TCP
          port: 8049
        - protocol: TCP
          port: 8050
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
        - ipBlock:
            cidr: 100.64.0.0/10
      ports:
        - protocol: TCP
          port: 8049
        - protocol: TCP
          port: 8050
