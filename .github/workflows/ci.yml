name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.x"
  GOLANGCI_LINT_VERSION: "v2.12.2"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check unfinished panic placeholders
        run: make panic-check

      - name: Check database migration policy
        run: make migration-check

      - name: Check config secrets
        run: make config-secret-check

      - name: Check startup validation
        run: make startup-validation-check

      - name: Check operations readiness assets
        run: make ops-check

      - name: Check architecture boundaries
        run: make architecture-check

      - name: Check protobuf drift
        run: make proto-check

      - name: Run tests
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        run: make lint-check

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...

  inventory-integration:
    name: Inventory Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      INVENTORY_MYSQL_USERNAME: root
      INVENTORY_MYSQL_PASSWORD: integration
      INVENTORY_MYSQL_HOST: 127.0.0.1
      INVENTORY_MYSQL_PORT: "3306"
      INVENTORY_MYSQL_DATABASE: goshop_inventory_ci

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: integration
          MYSQL_DATABASE: goshop_inventory_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pintegration"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run inventory real DB integration tests
        run: make inventory-integration-test

  review-integration:
    name: Review Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REVIEW_MYSQL_USERNAME: root
      REVIEW_MYSQL_PASSWORD: integration
      REVIEW_MYSQL_HOST: 127.0.0.1
      REVIEW_MYSQL_PORT: "3306"
      REVIEW_MYSQL_DATABASE: goshop_review_ci

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: integration
          MYSQL_DATABASE: goshop_review_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pintegration"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run review real DB integration tests
        run: env GOCACHE=/tmp/goshop-gocache go test ./app/review/srv/internal/data -run 'TestReviewRatingOutboxSurvivesRestartRealDB' -v

  schema-integration:
    name: Schema Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOSHOP_SCHEMA_TEST_MYSQL_USERNAME: root
      GOSHOP_SCHEMA_TEST_MYSQL_PASSWORD: integration
      GOSHOP_SCHEMA_TEST_MYSQL_HOST: 127.0.0.1
      GOSHOP_SCHEMA_TEST_MYSQL_PORT: "3306"
      GOSHOP_USER_SCHEMA_TEST_MYSQL_DATABASE: goshop_schema_ci
      GOSHOP_GOODS_SCHEMA_TEST_MYSQL_DATABASE: goshop_schema_ci
      GOSHOP_ORDER_SCHEMA_TEST_MYSQL_DATABASE: goshop_schema_ci
      GOSHOP_INVENTORY_SCHEMA_TEST_MYSQL_DATABASE: goshop_schema_ci
      GOSHOP_REVIEW_SCHEMA_TEST_MYSQL_DATABASE: goshop_schema_ci

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: integration
          MYSQL_DATABASE: goshop_schema_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pintegration"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run startup schema integration tests
        run: make schema-integration-test
