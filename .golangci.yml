version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    govet:
      disable:
        - inline
    staticcheck:
      checks:
        - all
        - -SA1019
        - -ST*
        - -S*
        - -QF*
  exclusions:
    paths:
      - vendor
      - testdata
      - third_party
      - ".*_test\\.go$"

run:
  timeout: 5m
